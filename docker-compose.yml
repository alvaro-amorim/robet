services:
  postgres:
    image: postgres:16-alpine
    container_name: robet-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-robet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-robet_password}
      POSTGRES_DB: ${POSTGRES_DB:-robet}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - robet_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-robet} -d ${POSTGRES_DB:-robet}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  robet_postgres_data:
